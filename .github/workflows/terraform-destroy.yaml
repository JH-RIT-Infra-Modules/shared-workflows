name: Terraform Destroy

on:
  workflow_call:
    inputs:
      environments:
        description: 'Environments to destroy (comma-separated: dev,test,stage,prod or "all")'
        required: true
        type: string
      confirm_destroy:
        description: 'Type "DESTROY" to confirm destruction'
        required: true
        type: string
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.14.5'
      tf_vars:
        description: 'JSON object of TF_VAR_ environment variables (e.g., {"foo": "bar"})'
        required: false
        type: string
        default: '{}'
      azure_keyvault_name:
        description: 'Name of the Azure Key Vault containing secrets'
        required: true
        type: string
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      BACKEND_RESOURCE_GROUP:
        required: true
      BACKEND_STORAGE_ACCOUNT:
        required: true
      BACKEND_CONTAINER_NAME:
        required: true
      BACKEND_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

env:
  TF_VERSION: ${{ inputs.terraform_version }}
  AZURE_KEYVAULT_NAME: ${{ inputs.azure_keyvault_name }}

jobs:
  setup:
    name: Setup & Validate
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.parse-envs.outputs.environments }}
    steps:
      - name: Validate Confirmation
        if: inputs.confirm_destroy != 'DESTROY'
        run: |
          echo "❌ ERROR: You must type 'DESTROY' to confirm destruction."
          echo "You entered: '${{ inputs.confirm_destroy }}'"
          exit 1

      - name: Parse Environments
        id: parse-envs
        run: |
          INPUT="${{ inputs.environments }}"
          if [ "$INPUT" == "all" ]; then
            ENVS='["dev","test","stage","prod"]'
          else
            ENVS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^"/;s/$/"/' | tr '\n' ',' | sed 's/,$//' | sed 's/^/[/;s/$/]/')
          fi
          echo "environments=$ENVS" >> $GITHUB_OUTPUT
          echo "🎯 Environments to destroy: $ENVS"

  destroy:
    name: Destroy (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        environment: ${{ fromJson(needs.setup.outputs.environments) }}
    environment: ${{ matrix.environment }}-destroy
    steps:
      - name: Display Warning
        run: |
          echo "⚠️  WARNING: Destroying infrastructure in ${{ matrix.environment }} environment"
          echo "⚠️  This action is IRREVERSIBLE!"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}''

      - name: Fetch Secrets from Azure Key Vault
        id: keyvault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Fetch all secrets from Key Vault
            SECRETS=$(az keyvault secret list --vault-name "${{ env.AZURE_KEYVAULT_NAME }}" --query "[].name" -o tsv)
            
            for SECRET_NAME in $SECRETS; do
              # Convert secret name to environment variable format (uppercase, replace hyphens with underscores)
              ENV_VAR_NAME=$(echo "$SECRET_NAME" | tr '[:lower:]' '[:upper:]' | tr '-' '_')
              SECRET_VALUE=$(az keyvault secret show --vault-name "${{ env.AZURE_KEYVAULT_NAME }}" --name "$SECRET_NAME" --query "value" -o tsv)
              echo "${ENV_VAR_NAME}=${SECRET_VALUE}" >> $GITHUB_ENV
              # Mask the secret in logs
              echo "::add-mask::${SECRET_VALUE}"
            done
            echo "✅ Secrets loaded from Key Vault: ${{ env.AZURE_KEYVAULT_NAME }}"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: JH-RIT-Infra-Modules

      - name: Configure Git for Module Access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set TF_VAR environment variables
        run: |
          if [ '${{ inputs.tf_vars }}' != '{}' ]; then
            echo '${{ inputs.tf_vars }}' | jq -r 'to_entries[] | "TF_VAR_\(.key)=\(.value)"' >> $GITHUB_ENV
          fi

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Destroy Plan
        run: |
          echo "📋 Generating destroy plan for ${{ matrix.environment }}..."
          if [ -f "environments/${{ matrix.environment }}.tfvars" ]; then
            terraform plan -destroy -var-file="environments/${{ matrix.environment }}.tfvars" -out=tfdestroy
          else
            terraform plan -destroy -out=tfdestroy
          fi

      - name: Terraform Destroy
        run: |
          echo "🗑️  Executing destruction for ${{ matrix.environment }}..."
          terraform apply -auto-approve tfdestroy
          echo "✅ Destruction complete for ${{ matrix.environment }}"