name: Terraform Build & Deploy

on:
  workflow_call:
    inputs:
      environments:
        description: 'Environments to deploy (comma-separated: dev,test,stage,prod or "all")'
        required: false
        type: string
        default: 'dev'
      run_deploy:
        description: 'Should the TF Apply Job Run?'
        required: false
        type: boolean
        default: false
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.5.0'
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      BACKEND_RESOURCE_GROUP:
        required: true
      BACKEND_STORAGE_ACCOUNT:
        required: true
      BACKEND_CONTAINER_NAME:
        required: true
      BACKEND_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

env:
  TF_VERSION: ${{ inputs.terraform_version }}

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.parse-envs.outputs.environments }}
    steps:
      - name: Parse Environments
        id: parse-envs
        run: |
          INPUT="${{ inputs.environments }}"
          if [ -z "$INPUT" ]; then INPUT="dev"; fi
          if [ "$INPUT" == "all" ]; then
            ENVS='["dev","test","stage","prod"]'
          else
            ENVS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed 's/^/"/;s/$/"/' | tr '\n' ',' | sed 's/,$//' | sed 's/^/[/;s/$/]/')
          fi
          echo "environments=$ENVS" >> $GITHUB_OUTPUT
          echo "🎯 Environments to process: $ENVS"

  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        environment: ${{ fromJson(needs.setup.outputs.environments) }}
    environment: ${{ matrix.environment }}
    outputs:
      plan-status: ${{ steps.plan.outcome }}
    steps:
      - name: Display Environment Info
        run: |
          echo "📋 Planning for environment: ${{ matrix.environment }}"
          echo "Triggered by: ${{ github.event_name }}"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: JH-RIT-Infra-Modules

      - name: Configure Git for Module Access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Plan
        id: plan
        run: |
          echo "🔍 Generating plan for ${{ matrix.environment }}..."
          if [ -f "environments/${{ matrix.environment }}.tfvars" ]; then
            terraform plan -var-file="environments/${{ matrix.environment }}.tfvars" -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Convert Plan to JSON
        run: terraform show -json tfplan > tfplan.json

      - name: Display Plan Summary
        run: |
          echo "📊 Terraform Plan Summary for ${{ matrix.environment }}:"
          echo "=========================================="
          if jq -e '.resource_changes' tfplan.json > /dev/null 2>&1; then
            cat tfplan.json | jq -r '.resource_changes[] | "\(.change.actions | join(",")) \(.type).\(.name)"' || echo "No changes detected"
          else
            echo "No resource changes in plan"
          fi
          echo "=========================================="

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: |
            tfplan
            tfplan.json
          retention-days: 5

  apply:
    name: Deploy (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: [setup, plan]
    if: ${{ inputs.run_deploy == true }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        environment: ${{ fromJson(needs.setup.outputs.environments) }}
    environment: ${{ matrix.environment }}
    steps:
      - name: Display Deployment Info
        run: |
          echo "🚀 Deploying to environment: ${{ matrix.environment }}"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: JH-RIT-Infra-Modules

      - name: Configure Git for Module Access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}

      - name: Terraform Apply
        run: |
          echo "⚡ Applying Terraform changes for ${{ matrix.environment }}..."
          terraform apply -auto-approve tfplan
          echo "✅ Deployment complete for ${{ matrix.environment }}"
