name: Terraform Build & Deploy

on:
  workflow_call:
    inputs:
      target_env:
        description: 'Target environment for this workflow (e.g., dev, test, stage, prod)'
        required: false
        type: string
      run_deploy:
        description: 'Should the TF Apply Job Run?'
        required: false
        type: boolean
        default: false
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.14.5'
      tf_vars:
        description: 'JSON object of TF_VAR_ environment variables (e.g., {"foo": "bar"})'
        required: false
        type: string
        default: '{}'
      terraform_directory:
        description: 'Directory containing Terraform configuration files'
        required: false
        type: string
        default: '.'
      terraform_init_upgrade:
        description: 'Use -upgrade flag during terraform init (updates provider versions)'
        required: false
        type: boolean
        default: false

env:
  TF_VERSION: ${{ inputs.terraform_version }}

jobs:
  plan:
    name: Plan (${{ inputs.target_env }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.target_env }}
    outputs:
      plan-status: ${{ steps.plan.outcome }}
    steps:
      - name: Display Environment Info
        run: |
          echo "📋 Planning for environment: ${{ inputs.target_env }}"
          echo "📁 Terraform directory: ${{ inputs.terraform_directory }}"
          echo "Triggered by: ${{ github.event_name }}"
          echo "DEBUG: TF_VAR_ENVIRONMENT=${{ vars.TF_VAR_ENVIRONMENT }}"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: JH-RIT-Infra-Modules

      - name: Configure Git for Module Access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}
          
      - name: Verify Backend Config Secrets
        run: |
          # Report existence of required backend secrets.
          if [ -z "${{ vars.BACKEND_RESOURCE_GROUP }}" ]; then
            echo "⚠️ BACKEND_RESOURCE_GROUP does NOT exist"
          else
            echo "✅ BACKEND_RESOURCE_GROUP exists"
          fi
          if [ -z "${{ vars.BACKEND_STORAGE_ACCOUNT }}" ]; then
            echo "⚠️ BACKEND_STORAGE_ACCOUNT does NOT exist"
          else
            echo "✅ BACKEND_STORAGE_ACCOUNT exists"
          fi
          if [ -z "${{ vars.BACKEND_CONTAINER_NAME }}" ]; then
            echo "⚠️ BACKEND_CONTAINER_NAME does NOT exist"
          else
            echo "✅ BACKEND_CONTAINER_NAME exists"
          fi
          if [ -z "${{ vars.BACKEND_KEY }}" ]; then
            echo "⚠️ BACKEND_KEY does NOT exist"
          else
            echo "✅ BACKEND_KEY exists"
          fi

      - name: Set TF_VAR environment variables
        run: |
          # Process tf_vars input (only variables prefixed with TF_VAR_)
          if [ '${{ inputs.tf_vars }}' != '{}' ]; then
            # For variables prefixed with TF_VAR_, convert variable name to lowercase while keeping TF_VAR_ prefix uppercase
            echo '${{ inputs.tf_vars }}' | jq -r 'to_entries[] | select(.key | startswith("TF_VAR_")) | "TF_VAR_" + (.key[7:] | ascii_downcase) + "=" + .value' >> $GITHUB_ENV
          fi
        env:
          TF_VAR_SECRETS: ${{ toJson(secrets) }}

      - name: Set TF_VAR secrets from inherited secrets
        run: |
          # Process inherited secrets (only secrets prefixed with TF_VAR_)
          echo '${{ toJson(secrets) }}' | jq -r 'to_entries[] | select(.key | startswith("TF_VAR_")) | "TF_VAR_" + (.key[7:] | ascii_downcase) + "=" + .value' >> $GITHUB_ENV

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          UPGRADE_FLAG=""
          if [ "${{ inputs.terraform_init_upgrade }}" = "true" ]; then
            UPGRADE_FLAG="-upgrade"
          fi
          terraform init $UPGRADE_FLAG \
            -backend-config="resource_group_name=${{ vars.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ vars.BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          echo "🔍 Generating plan for ${{ inputs.target_env }}..."
          if [ -f "environments/${{ inputs.target_env }}.tfvars" ]; then
            terraform plan -var-file="environments/${{ inputs.target_env }}.tfvars" -out=tfplan
          else
            terraform plan -out=tfplan
          fi

      - name: Convert Plan to JSON
        working-directory: ${{ inputs.terraform_directory }}
        run: terraform show -json tfplan > tfplan.json

      - name: Display Plan Summary
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          echo "📊 Terraform Plan Summary for ${{ inputs.target_env }}:"
          echo "=========================================="
          if jq -e '.resource_changes' tfplan.json > /dev/null 2>&1; then
            cat tfplan.json | jq -r '.resource_changes[] | "\(.change.actions | join(",")) \(.type).\(.name)"' || echo "No changes detected"
          else
            echo "No resource changes in plan"
          fi
          echo "=========================================="

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.target_env }}
          path: |
            ${{ inputs.terraform_directory }}/tfplan
            ${{ inputs.terraform_directory }}/tfplan.json
          retention-days: 5

      - name: Upload Plan (old path format)
        if: false
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.target_env }}-old
          path: |
            tfplan
            tfplan.json
          retention-days: 5

  apply:
    name: Deploy (${{ inputs.target_env }})
    runs-on: ubuntu-latest
    needs: [plan]
    if: ${{ inputs.run_deploy == true }}
    environment: ${{ inputs.target_env }}
    steps:
      - name: Display Deployment Info
        run: |
          echo "🚀 Deploying to environment: ${{ inputs.target_env }}"
          echo "📁 Terraform directory: ${{ inputs.terraform_directory }}"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: JH-RIT-Infra-Modules

      - name: Configure Git for Module Access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set TF_VAR environment variables
        run: |
          # Process tf_vars input (only variables prefixed with TF_VAR_)
          if [ '${{ inputs.tf_vars }}' != '{}' ]; then
            # For variables prefixed with TF_VAR_, convert variable name to lowercase while keeping TF_VAR_ prefix uppercase
            echo '${{ inputs.tf_vars }}' | jq -r 'to_entries[] | select(.key | startswith("TF_VAR_")) | "TF_VAR_" + (.key[7:] | ascii_downcase) + "=" + .value' >> $GITHUB_ENV
          fi

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          UPGRADE_FLAG=""
          if [ "${{ inputs.terraform_init_upgrade }}" = "true" ]; then
            UPGRADE_FLAG="-upgrade"
          fi
          terraform init $UPGRADE_FLAG \
            -backend-config="resource_group_name=${{ vars.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ vars.BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.target_env }}
          path: ${{ inputs.terraform_directory }}

      - name: Terraform Apply
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          echo "⚡ Applying Terraform changes for ${{ inputs.target_env }}..."
          terraform apply -auto-approve tfplan
          echo "✅ Deployment complete for ${{ inputs.target_env }}"