name: Terraform Validate

on:
  workflow_call:
    inputs:
      environments:
        description: 'Environments to validate (comma-separated: dev,test,stage,prod or "all")'
        required: false
        type: string
        default: 'all'
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.5.0'
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      BACKEND_RESOURCE_GROUP:
        required: true
      BACKEND_STORAGE_ACCOUNT:
        required: true
      BACKEND_CONTAINER_NAME:
        required: true
      BACKEND_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

env:
  TF_VERSION: ${{ inputs.terraform_version }}

jobs:
  # Parse the environments input
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.parse-envs.outputs.environments }}
    steps:
      - name: Parse Environments
        id: parse-envs
        run: |
          INPUT="${{ inputs.environments }}"
          if [ -z "$INPUT" ]; then INPUT="all"; fi
          if [ "$INPUT" == "all" ]; then
            ENVS='["dev","test","stage","prod"]'
          else
            # Convert comma-separated to JSON array
            ENVS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed 's/^/"/;s/$/"/' | tr '\n' ',' | sed 's/,$//' | sed 's/^/[/;s/$/]/')
          fi
          echo "environments=$ENVS" >> $GITHUB_OUTPUT
          echo "🎯 Environments to validate: $ENVS"

  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        environment: ${{ fromJson(needs.setup.outputs.environments) }}
    environment: ${{ matrix.environment }}
    steps:
      - name: Display Environment Info
        run: |
          echo "🔍 Validating environment: ${{ matrix.environment }}"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: JH-RIT-Infra-Modules

      - name: Configure Git for Module Access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Debug Secrets (check if set)
        run: |
          echo "Environment: ${{ matrix.environment }}"
          echo "Tenant ID set: ${{ secrets.ARM_TENANT_ID != '' }}"
          echo "Client ID set: ${{ secrets.ARM_CLIENT_ID != '' }}"
          echo "Subscription ID set: ${{ secrets.ARM_SUBSCRIPTION_ID != '' }}"
          echo "Client Secret set: ${{ secrets.ARM_CLIENT_SECRET != '' }}"

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: |
          echo "🔎 Running TFLint for ${{ matrix.environment }}..."
          tflint -f compact --minimum-failure-severity=error

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Format Check
        run: |
          echo "📝 Checking Terraform formatting..."
          terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          echo "✅ Validating Terraform configuration for ${{ matrix.environment }}..."
          if [ -f "environments/${{ matrix.environment }}.tfvars" ]; then
            terraform validate
            echo "📁 Environment-specific tfvars file found: environments/${{ matrix.environment }}.tfvars"
          else
            terraform validate
            echo "ℹ️  No environment-specific tfvars file found, using defaults"
          fi
          echo "✅ Validation complete for ${{ matrix.environment }}"
