name: Terraform Validate

on:
  workflow_call:
    inputs:
      environments:
        description: 'Environments to validate (comma-separated: dev,test,stage,prod or "all")'
        required: false
        type: string
        default: 'all'
      terraform_version:
        description: 'Terraform version to use'
        required: false
        type: string
        default: '1.14.5'
      tf_vars:
        description: 'JSON object of TF_VAR_ environment variables (e.g., {"foo": "bar"})'
        required: false
        type: string
        default: '{}'
      azure_keyvault_name:
        description: 'Name of the Azure Key Vault containing secrets (optional)'
        required: false
        type: string
        default: ''
      terraform_directory:
        description: 'Directory containing Terraform configuration files'
        required: false
        type: string
        default: '.'
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      BACKEND_RESOURCE_GROUP:
        required: true
      BACKEND_STORAGE_ACCOUNT:
        required: true
      BACKEND_CONTAINER_NAME:
        required: true
      BACKEND_KEY:
        required: true
      APP_ID:
        required: true
      APP_PRIVATE_KEY:
        required: true

env:
  TF_VERSION: ${{ inputs.terraform_version }}
  AZURE_KEYVAULT_NAME: ${{ inputs.azure_keyvault_name }}

jobs:
  # Parse the environments input
  setup:
    name: Setup
    runs-on: ubuntu-latest
    outputs:
      environments: ${{ steps.parse-envs.outputs.environments }}
    steps:
      - name: Parse Environments
        id: parse-envs
        run: |
          INPUT="${{ inputs.environments }}"
          if [ -z "$INPUT" ]; then INPUT="all"; fi
          if [ "$INPUT" == "all" ]; then
            ENVS='["dev","test","stage","prod"]'
          else
            # Convert comma-separated to JSON array
            ENVS=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | sed 's/^/"/;s/$/"/' | tr '\n' ',' | sed 's/,$//' | sed 's/^/[/;s/$/]/')
          fi
          echo "environments=$ENVS" >> $GITHUB_OUTPUT
          echo "🎯 Environments to validate: $ENVS"

  validate:
    name: Validate (${{ matrix.environment }})
    runs-on: ubuntu-latest
    needs: setup
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        environment: ${{ fromJson(needs.setup.outputs.environments) }}
    environment: ${{ matrix.environment }}
    steps:
      - name: Display Environment Info
        run: |
          echo "🔍 Validating environment: ${{ matrix.environment }}"
          echo "📁 Terraform directory: ${{ inputs.terraform_directory }}"

      - name: Checkout code
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: '{"clientId":"${{ secrets.ARM_CLIENT_ID }}","clientSecret":"${{ secrets.ARM_CLIENT_SECRET }}","subscriptionId":"${{ secrets.ARM_SUBSCRIPTION_ID }}","tenantId":"${{ secrets.ARM_TENANT_ID }}"}'

      - name: Fetch Secrets from Azure Key Vault
        if: inputs.azure_keyvault_name != ''
        id: keyvault
        uses: azure/CLI@v1
        with:
          inlineScript: |
            # Fetch all secrets from Key Vault
            SECRETS=$(az keyvault secret list --vault-name "${{ env.AZURE_KEYVAULT_NAME }}" --query "[].name" -o tsv)
            
            for SECRET_NAME in $SECRETS; do
              # Convert secret name to TF_VAR format (TF_VAR_ prefix uppercase, variable name lowercase, replace hyphens with underscores)
              VARIABLE_NAME=$(echo "${SECRET_NAME}" | tr '[:upper:]' '[:lower:]' | tr '-' '_')
              ENV_VAR_NAME="TF_VAR_${VARIABLE_NAME}"
              SECRET_VALUE=$(az keyvault secret show --vault-name "${{ env.AZURE_KEYVAULT_NAME }}" --name "$SECRET_NAME" --query "value" -o tsv)
              echo "${ENV_VAR_NAME}=${SECRET_VALUE}" >> $GITHUB_ENV
              # Mask the secret in logs
              echo "::add-mask::${SECRET_VALUE}"
              echo "🔐 Loaded secret: ${ENV_VAR_NAME}"
            done
            echo "✅ Secrets loaded from Key Vault: ${{ env.AZURE_KEYVAULT_NAME }}"

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: JH-RIT-Infra-Modules

      - name: Configure Git for Module Access
        run: |
          git config --global url."https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/".insteadOf "https://github.com/"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3

      - name: Initialize TFLint
        working-directory: ${{ inputs.terraform_directory }}
        run: tflint --init

      - name: Run TFLint
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          echo "🔎 Running TFLint for ${{ matrix.environment }}..."
          tflint -f compact --minimum-failure-severity=error
          
      - name: Debug - Output Backend Config Environment Variables
        run: |
          echo "BACKEND_RESOURCE_GROUP=${{ secrets.BACKEND_RESOURCE_GROUP }}"
          echo "BACKEND_STORAGE_ACCOUNT=${{ secrets.BACKEND_STORAGE_ACCOUNT }}"
          echo "BACKEND_CONTAINER_NAME=${{ secrets.BACKEND_CONTAINER_NAME }}"
          echo "BACKEND_KEY=${{ secrets.BACKEND_KEY }}"

      - name: Set TF_VAR environment variables
        run: |
          # Process tf_vars input (only variables prefixed with TF_VAR_)
          if [ '${{ inputs.tf_vars }}' != '{}' ]; then
            # For variables prefixed with TF_VAR_, convert variable name to lowercase while keeping TF_VAR_ prefix uppercase
            echo '${{ inputs.tf_vars }}' | jq -r 'to_entries[] | select(.key | startswith("TF_VAR_")) | "TF_VAR_" + (.key[7:] | ascii_downcase) + "=" + .value' >> $GITHUB_ENV
          fi

      - name: Debug TF_VAR environment variables
        run: |
          echo "📊 TF_VAR environment variables set:"
          env | grep -i '^TF_VAR_' || echo "⚠️  No TF_VAR_ variables found"
          echo "---"
          echo "Raw tf_vars input received:"
          echo '${{ inputs.tf_vars }}'

      - name: Terraform Init
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ secrets.BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.BACKEND_CONTAINER_NAME }}" \
            -backend-config="key=${{ secrets.BACKEND_KEY }}"
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

      - name: Terraform Format Check
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          echo "📝 Checking Terraform formatting..."
          terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          echo "✅ Validating Terraform configuration for ${{ matrix.environment }}..."
          if [ -f "environments/${{ matrix.environment }}.tfvars" ]; then
            terraform validate
            echo "📁 Environment-specific tfvars file found: environments/${{ matrix.environment }}.tfvars"
          else
            terraform validate
            echo "ℹ️  No environment-specific tfvars file found, using defaults"
          fi
          echo "✅ Validation complete for ${{ matrix.environment }}"